apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: production
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
          query: |
            sum(rate(nginx_ingress_controller_requests{service="{{args.service-name}}",status!~"5.."}[2m]))
            /
            sum(rate(nginx_ingress_controller_requests{service="{{args.service-name}}"}[2m]))
