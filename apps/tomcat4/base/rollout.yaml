apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: tomcat4
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tomcat4
  template:
    metadata:
      labels:
        app: tomcat4
    spec:
      containers:
        - name: tomcat4
          image: harbor.devops.local:7581/devops/tomcat4:d647f977
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: jmx
              containerPort: 9404
          env:
            - name: OTEL_SERVICE_NAME
              value: "tomcat4"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc:4317"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "namespace=staging,app=tomcat4"
            - name: APP_VERSION
              value: "2.0.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
  strategy:
    canary:
      stableService: tomcat4-stable
      canaryService: tomcat4-canary
      trafficRouting:
        nginx:
          stableIngress: tomcat4
      analysis:
        templates:
          - templateName: success-rate
        args:
          - name: ingress-name
            value: tomcat4
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}
