apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tomcat2
  namespace: production
spec:
  ingressClassName: nginx
  rules:
    - host: tomcat2.devops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tomcat2-stable
                port:
                  number: 8080
