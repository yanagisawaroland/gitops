apiVersion: v1
kind: Service
metadata:
  name: tomcat2-stable
  namespace: production
  labels:
    app: tomcat2
spec:
  selector:
    app: tomcat2
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: jmx
      port: 9404
      targetPort: 9404
---
apiVersion: v1
kind: Service
metadata:
  name: tomcat2-canary
  namespace: production
  labels:
    app: tomcat2
spec:
  selector:
    app: tomcat2
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: jmx
      port: 9404
      targetPort: 9404
