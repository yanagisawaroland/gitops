apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: myapp2
  namespace: production
spec:
  replicas: 0
  selector:
    matchLabels:
      app: myapp2
  template:
    metadata:
      labels:
        app: myapp2
    spec:
      containers:
        - name: myapp2
          image: harbor.devops.local:7581/devops/myapp2:c2dfc92c
          ports:
            - containerPort: 80
  strategy:
    canary:
      stableService: myapp2-stable
      canaryService: myapp2-canary
      trafficRouting:
        nginx:
          stableIngress: myapp2
      analysis:
        templates:
          - templateName: success-rate
        args:
          - name: ingress-name
            value: myapp2
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}
